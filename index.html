<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CI/CD Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #333;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffd369;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🚀 CI/CD Pipeline Test</h1>
    <p>If you see this update, your pipeline is working perfectly!</p>

    <button class="btn" onclick="changeText()">Click Me</button>

    <div class="footer">
      Version: <span id="version">v1.0</span>
    </div>
  </div>

  <script>
    function changeText() {
      document.querySelector("p").innerText = "🔥 CI/CD is working!";
    }
  </script>

</body>
</html>
