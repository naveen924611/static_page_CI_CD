<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CI/CD Pipeline Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      color: white;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px 30px;
      border-radius: 18px;
      text-align: center;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      max-width: 420px;
      width: 90%;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .status {
      display: inline-block;
      margin-bottom: 15px;
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 12px;
      background: #28a745;
      color: white;
      box-shadow: 0 0 10px #28a745;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 5px #28a745; }
      50% { box-shadow: 0 0 20px #28a745; }
      100% { box-shadow: 0 0 5px #28a745; }
    }

    p {
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .btn {
      position: relative;
      overflow: hidden;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #333;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffd369;
      transform: scale(1.05);
    }

    .btn:active::after {
      content: "";
      position: absolute;
      width: 100px;
      height: 100px;
      background: rgba(0,0,0,0.1);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: ripple 0.5s ease-out;
    }

    @keyframes ripple {
      from { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }

    .version {
      font-weight: bold;
      color: #ffd369;
    }

    .time {
      margin-top: 8px;
      font-size: 11px;
      opacity: 0.6;
    }

  </style>
</head>

<body>

  <div class="card">
    <h1>🚀 CI/CD Pipeline</h1>

    <div class="status">✔ Deployment Successful</div>

    <p id="message">
      Your latest build has been deployed successfully.
    </p>

    <button class="btn" onclick="changeText()">Test Interaction</button>

    <div class="footer">
      Version: <span class="version" id="version">v2.0</span>
      <div class="time" id="time"></div>
    </div>
  </div>

  <script>
    function changeText() {
      const msg = document.getElementById("message");
      msg.innerText = "🔥 CI/CD is working perfectly!";
      msg.style.color = "#ffd369";
    }

    // Show current time (simulating deployment time)
    const timeElement = document.getElementById("time");
    const now = new Date();
    timeElement.innerText = "Last deployed: " + now.toLocaleString();
  </script>

</body>
</html>
